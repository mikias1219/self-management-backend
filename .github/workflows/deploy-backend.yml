name: Deploy Backend to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RESOURCE_GROUP: task-managamnet-rg
  ACR_NAME: taskmanagamnetacr
  BACKEND_APP: task-managamnet-backend
  DEFAULT_DOMAIN: ambitiousmushroom-6a766356.centralus.azurecontainerapps.io

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and Push Backend Image
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/task-managamnet/backend:${{ github.sha }} \
                       -t ${{ env.ACR_NAME }}.azurecr.io/task-managamnet/backend:latest .
          docker push ${{ env.ACR_NAME }}.azurecr.io/task-managamnet/backend:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/task-managamnet/backend:latest

      - name: Update Backend Container App
        run: |
          az containerapp update \
            --name ${{ env.BACKEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/task-managamnet/backend:${{ github.sha }} \
            --target-port 8080

      - name: Deployment Summary
        run: |
          echo "✅ Backend deployment complete!"
          echo "Backend URL: https://${{ env.BACKEND_APP }}.${{ env.DEFAULT_DOMAIN }}"
          echo "Resource Group: ${{ env.RESOURCE_GROUP }}"
